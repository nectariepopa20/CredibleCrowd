# Timezone used for the six four-hour periods.
timezone: Europe/Bucharest
periods:
  00-04: { min: 12, max: 28 }
  04-08: { min: 7, max: 18 }
  08-12: { min: 22, max: 52 }
  12-16: { min: 45, max: 90 }
  16-20: { min: 75, max: 140 }
  20-00: { min: 50, max: 105 }

# Order expresses popularity; weight controls the proportional allocation.
servers:
  - { name: survival, weight: 55 }
  - { name: skyblock, weight: 30 }
  - { name: lobby, weight: 15 }

update-seconds: 60
# Smaller activity ticks create staggered joins/leaves between target recalculations.
activity-tick-seconds: 10
jitter: 0.16
seed: 8743921
# Fraction of the active virtual population replaced per minute on average.
turnover-per-minute: 0.06
# Probability that an activity tick has no background joins/leaves.
quiet-tick-chance: 0.28
# Maximum fraction used to catch up toward the target during a single activity tick.
max-correction-ratio: 0.025
display-mode: add-to-real # add-to-real or replace
maximum-players: 500
reserve-fake-names: true
already-connected-message: "You are already connected to this proxy!"
