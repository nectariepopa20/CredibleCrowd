enabled: true

# CredibleCrowd-Citizens only acts in these lobby worlds. Keep this list limited
# so survival, SkyBlock and other game modes are never affected.
lobby-scope:
  worlds:
    - "world"
  # Format: world,min-x,min-y,min-z,max-x,max-y,max-z
  # NPCs never spawn or remain outside these hard boundaries.
  npc-regions:
    - "world,-122,20,254,-66,50,310"

materialization:
  percentage: 0.20
  global-limit: 40
  per-world-limit: 20
  per-real-player-limit: 8
  activation-distance: 64
  despawn-distance: 96
  reconcile-seconds: 10
  spawn-batch-size: 2
  # Keep false in a lobby: NPCs stay in configured anchors/regions rather
  # than appearing near a real player who walks elsewhere.
  allow-fallback-near-players: false

# NPCs are placed near real players by default. Explicit safe anchors can be
# added as "world,x,y,z,yaw,pitch". Anchors are preferred when a real player is
# within activation-distance of them.
spawn-anchors: []

behaviors:
  # Runtime scheduler; individual controllers also enforce tick-millis.
  scheduler-ticks: 5
  tick-millis: 250
  transition-pause-min-millis: 1000
  transition-pause-max-millis: 5000
  afk-weight: 35
  look-around-weight: 20
  wander-weight: 45
  duration-min-seconds: 30
  duration-max-seconds: 180
  wander-radius: 20
  wander-speed-min: 0.85
  wander-speed-max: 1.15

# Optional CustomJoinItems integration. Item keys are top-level entries in
# CustomJoinItems/items.yml, not the display name of the item.
custom-join-items:
  enabled: true
  lobby-afk:
    # A deterministic fraction of virtual identities stays AFK and holds this item.
    percentage: 0.65
    item-key: "lobby-compass"
  # Optional CJI keys assigned to non-AFK NPCs deterministically. Leave empty to
  # give hand items only to lobby AFK NPCs.
  wandering-item-keys: []

# Optional named routes. Waypoint format: world,x,y,z,yaw,pitch
patrol-routes: {}
# Example:
#  lobby-loop:
#    weight: 15
#    activation-distance: 64
#    speed: 1.0
#    pause-seconds: 2
#    waypoints:
#      - "world,10.5,65,10.5,0,0"
#      - "world,20.5,65,10.5,90,0"

# Calibrated courses only. Checkpoint format:
# world,x,y,z,yaw,pitch,horizontal-speed,vertical-speed,settle-millis
parkour-courses: {}
# Example:
#  lobby-easy:
#    weight: 8
#    activation-distance: 12
#    mistake-chance: 0.08
#    maximum-failures: 4
#    jump-timeout-millis: 2500
